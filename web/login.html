<!DOCTYPE html>

<head>
  <link rel="stylesheet" href="/fonts/aurebesh/Aurebesh.css">
  <link rel="stylesheet" href="/login.css">
  <link rel="stylesheet" href="/index.css">
  <title>Login Stream Assistant</title>
</head>

<h2 class="AB212">} 212th AB }</h2>
<h2>Stream Assistant</h2>

<form action="http://localhost:3000/login" method="post">
  <div class="loginContainer">
    <label for="user"><b>
      Username
    </b></label>
    <input type="text" placeholder="Enter Username" name="user" required>
    <label for="pass"><b>
      Password
    </b></label>
    <input id="password" name="pass" type="password" placeholder="Enter Password" autocomplete="current-password" required>
    <span class="spacer"></span>
    <button type="submit">Login</button>

    <label class="checkbox">
      <input type="checkbox" checked="checked" name="remember">
      <span class="checkbox-container"></span>
      Remember me
    </label>
  </div>
  <footer><p>For registration please contact 2003 "Dans"</p></footer>
</form>
