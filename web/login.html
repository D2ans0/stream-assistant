<!DOCTYPE html>

<head>
  <link rel="stylesheet" href="fonts/aurebesh/Aurebesh.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/login.css">
  <title>Login Stream Assistant</title>
</head>

<h2 class="AB212">} 212th AB }</h2>
<h2>Stream Assistant</h2>

<form action="http://localhost:3000/login" method="post">
  <div class="loginContainer">
    <label for="loginUser">Username</label>
    <input id="loginUser" type="text" name="user" required>
    <label for="loginPassword">Password</label>
    <input id="loginPassword" name="pass" type="password" autocomplete="current-password" required>
    <span class="spacer"></span>
    <button id="login" type="submit">Login</button>

    <label class="checkbox">
      <input type="checkbox" checked="checked" name="remember">
      <span class="checkbox-container"></span>
      Remember me
    </label>
  </div>
</form>
<footer>For registration please contact 2003 "Dans"</footer>
