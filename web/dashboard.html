<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>
    <link href="fonts/fontawesome/fontawesome.css" rel="stylesheet" />
    <link href="fonts/fontawesome/solid.css" rel="stylesheet" />
    <link href="fonts/fontawesome/v5-font-face.css" rel="stylesheet" />
    <link href="css/dashboard.css" rel="stylesheet" />
    <link href="css/common.css" rel="stylesheet" />
  </head>

  <body onload="init()">
    <nav>
      <button class="outlineBtn" id="userButton" popovertarget="userMenu"><i class="fa-solid fa-user"></i></button>
      <div class="select-wrapper">
        <button class="outlineBtn" id="editChannel" title="Edit channel" onclick="displayMessage('Under construction', true)"><i class="fa-solid fa-wrench"></i></button>
        <button id="channelDropdown" popovertarget="channelList" class="custom-select">Channel Name</button>
        <ul popover id="channelList" class="custom-select-list">
          <!-- gets populated from JS -->
        </ul>
        <button class="outlineBtn" id="linkNewChannel" title="Link new channel" onclick="location.href='/twitch/oauth'"><i class="fa-solid fa-plus"></i></button>
      </div>
      <button class="outlineBtn" id="reload" title="Reload info on page" onclick="init(); rotateOnPress(this)"><i class="fa-solid fa-arrow-rotate-right"></i></button>
    </nav>
    <div id="mainContainer">
      <div id="twitch-embed"></div>
      <form id="streamTitleForm">
        <label for="streamTitle">Stream title<br></label>
        <span class="text-form-wrapper">
          <input type="text" id="streamTitle" name="streamTitle">
          <input type="submit" value="Set">
        </span>
      </form>
    
    </div>
    <div popover="auto" id="userMenu">
      <label class="displayPerms">Username</label>
      <button onclick="registerNewUserDialog.showModal()">Register New User</button>
      <button onclick="changePasswordDialog.showModal()">Change Password</button>
      <button onclick="location.href='/logout'">Log out</button>
    </div>
    <dialog popover="manual" class="dashModal" id="registerNewUserDialog">
      User registration form:
      <form action="javascript:;" onsubmit="registerNewUser(this)" method="post">
        <label for="user">Name</label>
        <input id="user" name="user" type="text" autocomplete="off" required>
        <label for="pass">Password for user</label>
        <input id="pass" name="pass" type="password" required>
        <label for="passRepeat">Repeat Password</label>
        <input id="passRepeat" name="passRepeat" type="password" required>
        <div class="select-wrapper full-width">
          <button type="button" id="permsDropdown" popovertarget="permsList" class="custom-select">Permissions</button>
          <ul popover id="permsList" class="custom-select-list">
            <!-- gets populated from JS -->
          </ul>
        </div>
        <span>
          <button id="registerNewUserSubmit" type="submit">Submit</button>
          <button type="reset" onclick="registerNewUserDialog.close()">Cancel</button>
        </span>
      </form>
    </dialog>
    <dialog popover="manual" class="dashModal" id="changePasswordDialog">
      Password change form:
      <form action="javascript:;" onsubmit="changePassword(this)" method="post">
        <label for="oldPassword">Old Password</label>
        <input id="oldPassword" name="oldPassword" type="password" required>
        <label for="newPassword">New Password</label>
        <input id="newPassword" name="passRepeat" type="password" required>
        <label for="newPasswordRepeat">Repeat New Password</label>
        <input id="newPasswordRepeat" name="newPassRepeat" type="password" required>
        <span>
          <button id="changePasswordSubmit" type="submit">Submit</button>
          <button type="reset" onclick="changePasswordDialog.close()" >Cancel</button>
        </span>
      </form>
    </dialog>
    <div popover="manual" id="messageList"></div>
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
    <script src="js/common.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
