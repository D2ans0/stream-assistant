<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>
    <link href="common.css" rel="stylesheet" />
  </head>
  <body>
  <form id="channelNameForm">
    <label for="channelName">Channel Name</label>
    <input type="text" id="channelName" name="channelName">
    <input type="submit" value="Submit">
    <p id="formOutput"></p>
  </form>
    <script>
      document.getElementById("channelNameForm").addEventListener("submit", function (e) {
        e.preventDefault();
        getChannelID(e.target)
      });
      function getChannelID(form) {
        const URL = "/twitch/getChannelID"
        var formData = new FormData(form)
        try {
          fetch(URL, {
            method: "POST",
            body: formData
          })
          .then(response => response.text())
          .then(data => {
              document.getElementById("formOutput").innerHTML = data
          })
        } catch (e) {
          console.error(e)
          document.getElementById("formOutput").innerHTML = e
        }
      }
    </script>
  </body>
</html>
